{% extends 'base.html' %}
{% block title %}로그인 – Hospital AI{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center"
  style="background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);">
  <div class="card shadow-lg" style="width:380px">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
          style="width:64px;height:64px;background:#eff6ff">
          <i class="fas fa-hospital-user fa-2x text-primary"></i>
        </div>
        <h4 class="fw-bold mb-1">Hospital AI</h4>
        <p class="text-muted small mb-0">병원 AI 플랫폼</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 small">
        <i class="fas fa-circle-exclamation me-1"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post" autocomplete="off">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label small fw-semibold">아이디</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="fas fa-user text-muted" style="font-size:13px"></i>
            </span>
            <input type="text" name="username" class="form-control border-start-0" placeholder="아이디를 입력하세요" autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label small fw-semibold">비밀번호</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="fas fa-lock text-muted" style="font-size:13px"></i>
            </span>
            <input type="password" name="password" class="form-control border-start-0" placeholder="비밀번호를 입력하세요">
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">
          <i class="fas fa-right-to-bracket me-2"></i>로그인
        </button>
      </form>

      <div class="text-center mt-4 text-muted" style="font-size:11px">
        기본 계정: <strong>admin</strong> / <strong>admin1234</strong>
      </div>
    </div>
  </div>
</div>
{% endblock %}
